name: 🐞 Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "macOS 14.5, Apple M2, app vX.Y.Z"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
      description: Anything else that helps (optional).
